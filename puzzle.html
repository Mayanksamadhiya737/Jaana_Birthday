<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puzzle Challenge ❤️</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/puzzle.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
</head>
<body>
    <!-- ENVELOPE: no modal, just envelope on pink background -->
    <div id="envelopeStage">
        <div class="envelope" id="envelope">
            <div class="envelope-heart" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path fill-rule="evenodd" d="M11.645 20.91l-.007-.003-.022-.012a15.247 15.247 0 01-.383-.218 25.18 25.18 0 01-4.244-3.17C4.688 15.36 2.25 12.174 2.25 8.25 2.25 5.322 4.714 3 7.688 3A5.5 5.5 0 0112 5.052 5.5 5.5 0 0116.313 3c2.973 0 5.437 2.322 5.437 5.25 0 3.925-2.438 7.111-4.739 9.256a25.175 25.175 0 01-4.244 3.17 15.247 15.247 0 01-.383.219l-.022.012-.007.004-.003.001a.752.752 0 01-.704 0l-.003-.001z" clip-rule="evenodd" /></svg>
            </div>
            <div class="envelope-flap">
                <svg class="envelope-flap-outline" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
                    <line x1="0" y1="0" x2="50" y2="50" stroke="#d4c4a8" stroke-width="3" vector-effect="non-scaling-stroke" />
                    <line x1="50" y1="50" x2="100" y2="0" stroke="#d4c4a8" stroke-width="3" vector-effect="non-scaling-stroke" />
                </svg>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="modal-inner">
            <!-- VIEW: Puzzle (playing + completed state in same view) -->
            <div id="puzzleView" class="modal-view">
                <!-- Puzzle Title Heading -->
                <div class="puzzle-title-section">
                    <h1 class="puzzle-title">
                        <i class="fas fa-birthday-cake"></i> Birthday Love Puzzle Challenge
                    </h1>
                </div>

                <!-- Puzzle Controls Row -->
                <div class="puzzle-controls-row">
                    <div class="controls-item">
                        <label>Difficulty:</label>
                        <select id="difficultySelect" onchange="changeDifficulty()">
                            <option value="easy">Easy</option>
                            <option value="medium" selected>Medium</option>
                            <option value="hard">Hard</option>
                        </select>
                    </div>
                    <div class="controls-item">
                        <span class="control-label">Time:</span>
                        <span class="control-value" id="timerDisplay">0:00</span>
                    </div>
                    <div class="controls-item">
                        <span class="control-label">Moves:</span>
                        <span class="control-value" id="movesDisplay">0</span>
                    </div>
                    <button class="control-btn" onclick="startNewGame()" title="New Game">
                        <i class="fas fa-redo"></i> New Game
                    </button>
                    <button class="control-btn" onclick="showSolution()" title="Show Solution">
                        <i class="fas fa-eye"></i> Show Solution
                    </button>
                </div>
                <div class="puzzle-container" id="puzzleContainer">
                    <div class="puzzle-grid-wrap" id="puzzleGridWrap">
                        <div class="puzzle-grid" id="puzzleGrid"></div>
                        <div class="puzzle-full-image-overlay" id="puzzleFullImageOverlay">
                            <img src="assets/puzzle/full-image.png" alt="" />
                        </div>
                    </div>
                </div>
                <div class="puzzle-reveal-text" id="puzzleRevealText">
                    <p class="complete-line">...you complete me.</p>
                    <p class="valentine-question">You are my never-ending love.</p>
                </div>
                <div class="puzzle-bottom-nav">
                    <button class="btn-back" onclick="goBack()">Back to Options</button>
                </div>
            </div>

            <!-- VIEW: Success -->
            <!-- <div id="successView" class="modal-view">
                <p class="modal-title">Yay, I can't wait!</p>
                <div class="success-gif-wrap">
                    <img src="assets/general/How Dare You.gif" alt="" />
                </div>
                <button type="button" class="reset-btn" id="resetBtn">Reset</button>
            </div> -->
        </div>
    </div>

    <!-- Solution Modal -->
    <div id="solutionModal" class="solution-modal" style="display:none;">
        <div class="solution-content">
            <span class="solution-close" onclick="closeSolution()">&times;</span>
            <h3>Solution Preview</h3>
            <img src="assets/puzzle/full-image.png" alt="Solution" class="solution-image"/>
        </div>
    </div>

    <script src="js/puzzle-game.js"></script>
</body>
</html>
